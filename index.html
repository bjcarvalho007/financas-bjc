<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanças Mensais</title>

<!-- Ícone da Aba (Favicon) usando Emoji -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💎</text></svg>">

<!-- Configurações para aparecer como App no iPhone e Android -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finanças BJC">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%230f172a%22/><text x=%2250%%22 y=%2250%%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 font-size=%2260%22>💎</text></svg>">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #0f172a;
  --accent: #10b981;
  --accent-hover: #059669;
  --bg: #f8fafc;
  --surface: #ffffff;
  --text: #1e293b;
  --text-muted: #64748b;
  --danger: #ef4444;
  --success: #10b981;
  --border: #e2e8f0;
  --radius: 12px;
  --shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background-color: var(--bg);
  color: var(--text);
  line-height: 1.6;
  padding-bottom: 80px;
}

.app-container {
  max-width: 1000px;
  margin: 0 auto;
  padding: 20px;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
  padding: 20px 0;
}

.brand-title {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--primary);
  display: flex;
  align-items: center;
  gap: 10px;
}

.summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
  margin-bottom: 30px;
}

.card {
  background: var(--surface);
  padding: 24px;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}

.card-label { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.card-value { font-size: 1.75rem; font-weight: 700; margin-top: 5px; font-family: 'JetBrains Mono', monospace; }

.nav-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--surface);
  padding: 10px 20px;
  border-radius: var(--radius);
  margin-bottom: 20px;
  border: 1px solid var(--border);
}

.month-nav {
  display: flex;
  align-items: center;
  gap: 15px;
  font-weight: 700;
}

.month-nav button {
  background: var(--bg);
  border: 1px solid var(--border);
  width: 32px;
  height: 32px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.tab-btn {
  background: transparent;
  border: none;
  padding: 10px 20px;
  font-weight: 600;
  color: var(--text-muted);
  cursor: pointer;
  border-radius: 8px;
}

.tab-btn.active {
  background: var(--primary);
  color: white;
}

.expense-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.expense-item {
  background: var(--surface);
  padding: 16px;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: space-between;
  border: 1px solid var(--border);
}

.item-left { display: flex; align-items: center; gap: 15px; }
.item-icon { 
  width: 48px; height: 48px; border-radius: 12px; 
  display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
}

.item-details .name { font-weight: 700; font-size: 1rem; }
.item-details .meta { font-size: 0.8rem; color: var(--text-muted); }

.item-right { text-align: right; display: flex; align-items: center; gap: 15px; }
.item-price { font-family: 'JetBrains Mono', monospace; font-weight: 700; }

.btn-add {
  background: var(--accent);
  color: white;
  border: none;
  padding: 12px 24px;
  border-radius: 10px;
  font-weight: 700;
  cursor: pointer;
}

.btn-pay {
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 0.75rem;
  font-weight: 700;
  cursor: pointer;
}

.btn-pay.paid { background: var(--success); color: white; border-color: var(--success); }
.btn-pay.partial { background: #fef3c7; border-color: #f59e0b; color: #b45309; }

.btn-del { color: var(--danger); background: none; border: none; cursor: pointer; padding: 5px; }

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.6);
  backdrop-filter: blur(4px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 20px;
}

.modal-overlay.open { display: flex; }

.modal {
  background: var(--surface);
  width: 100%;
  max-width: 400px;
  border-radius: 20px;
  padding: 30px;
  position: relative;
}

.modal-header { margin-bottom: 20px; font-weight: 700; font-size: 1.2rem; }

.input-group { margin-bottom: 15px; }
.input-group label { display: block; font-size: 0.8rem; font-weight: 700; margin-bottom: 5px; color: var(--text-muted); }
.input-group input, .input-group select {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  font-family: inherit;
}

footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  text-align: center;
  padding: 20px;
  background: var(--bg);
  font-size: 0.8rem;
  color: var(--text-muted);
  font-weight: 600;
}

@media (max-width: 600px) {
  header { flex-direction: column; gap: 15px; text-align: center; }
  .expense-item { flex-direction: column; align-items: flex-start; gap: 15px; }
  .item-right { width: 100%; justify-content: space-between; border-top: 1px solid var(--border); padding-top: 10px; }
}

#toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-100px);
  background: var(--primary);
  color: white;
  padding: 12px 30px;
  border-radius: 30px;
  font-weight: 600;
  transition: 0.4s;
  z-index: 2000;
}
#toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="toast">Ação realizada!</div>

<div class="app-container">
  <header>
    <div class="brand-title">💎 Finanças Mensais</div>
    <button class="btn-add" onclick="toggleModal('modal-add', true)">+ Novo Gasto</button>
  </header>

  <div class="summary-grid">
    <div class="card">
      <div class="card-label">Previsto Total</div>
      <div class="card-value" id="res-total">R$ 0,00</div>
    </div>
    <div class="card" style="border-left: 5px solid var(--success);">
      <div class="card-label">Total Pago</div>
      <div class="card-value" id="res-paid" style="color: var(--success);">R$ 0,00</div>
    </div>
    <div class="card" style="border-left: 5px solid var(--danger);">
      <div class="card-label">Falta Pagar</div>
      <div class="card-value" id="res-pending" style="color: var(--danger);">R$ 0,00</div>
    </div>
  </div>

  <div class="nav-bar">
    <div class="month-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <span id="display-date">Abril 2024</span>
      <button onclick="changeMonth(1)">›</button>
    </div>
    <div style="font-size: 0.8rem; font-weight: 700; color: var(--accent);">Balanço do Mês</div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-fixos" onclick="switchTab('fixos')">Fixos</button>
    <button class="tab-btn" id="tab-variaveis" onclick="switchTab('variaveis')">Variáveis</button>
  </div>

  <div id="expense-list" class="expense-list"></div>
</div>

<footer>
  Todos os direitos reservados - Benedito junior © <span id="footer-year"></span>
</footer>

<!-- Modal Add -->
<div class="modal-overlay" id="modal-add">
  <div class="modal">
    <div class="modal-header">Novo Lançamento</div>
    <div class="input-group">
      <label>Título do Gasto</label>
      <input type="text" id="in-name" placeholder="Ex: Internet, Aluguel...">
    </div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
      <div class="input-group">
        <label>Valor Total (R$)</label>
        <input type="number" id="in-amount" step="0.01" placeholder="0.00">
      </div>
      <div class="input-group">
        <label>Categoria</label>
        <select id="in-cat">
          <option value="moradia">🏠 Moradia</option>
          <option value="alimentacao">🍕 Alimentação</option>
          <option value="transporte">🚗 Transporte</option>
          <option value="saude">🏥 Saúde</option>
          <option value="lazer">🎮 Lazer</option>
          <option value="outros">📦 Outros</option>
        </select>
      </div>
    </div>
    <div class="input-group">
      <label>Vencimento</label>
      <input type="text" id="in-due" placeholder="Ex: Dia 10">
    </div>
    <div style="display: flex; gap: 10px; margin-top: 20px;">
      <button class="btn-add" style="flex: 1;" onclick="addExpense()">Salvar</button>
      <button class="btn-pay" style="padding: 12px; border-radius: 10px;" onclick="toggleModal('modal-add', false)">Cancelar</button>
    </div>
  </div>
</div>

<!-- Modal Pay -->
<div class="modal-overlay" id="modal-pay">
  <div class="modal">
    <div class="modal-header">Registrar Pagamento</div>
    <div id="pay-details" style="margin-bottom: 20px; padding: 15px; background: var(--bg); border-radius: 10px; font-size: 0.9rem;">
      <!-- Preenchido via JS -->
    </div>
    <div class="input-group">
      <label>Quanto deseja pagar agora? (R$)</label>
      <input type="number" id="pay-value" step="0.01" placeholder="0.00">
    </div>
    <div style="display: flex; gap: 10px; margin-top: 20px;">
      <button class="btn-add" style="flex: 1;" onclick="confirmPayment()">Confirmar</button>
      <button class="btn-pay" style="padding: 12px; border-radius: 10px;" onclick="toggleModal('modal-pay', false)">Voltar</button>
    </div>
  </div>
</div>

<script>
const MONTHS = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
const CATEGORIES = {
  moradia: { icon: '🏠', bg: '#eff6ff', color: '#3b82f6' },
  alimentacao: { icon: '🍕', bg: '#fff7ed', color: '#f97316' },
  transporte: { icon: '🚗', bg: '#fef2f2', color: '#ef4444' },
  saude: { icon: '🏥', bg: '#f0fdf4', color: '#22c55e' },
  lazer: { icon: '🎮', bg: '#fdf4ff', color: '#d946ef' },
  outros: { icon: '📦', bg: '#f8fafc', color: '#64748b' }
};

let date = new Date();
let curMonth = date.getMonth();
let curYear = date.getFullYear();
let currentTab = 'fixos';
let state = {};
let currentPayId = null;

function getDbKey() { return `bjc_data_${curYear}_${curMonth}`; }

function load() {
  const saved = localStorage.getItem('bjc_financas_db');
  if (saved) state = JSON.parse(saved);
  if (!state[getDbKey()]) state[getDbKey()] = { fixos: [], variaveis: [] };
}

function save() {
  localStorage.setItem('bjc_financas_db', JSON.stringify(state));
  render();
}

const fmt = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);

function render() {
  const data = state[getDbKey()];
  const list = data[currentTab];
  const container = document.getElementById('expense-list');

  document.getElementById('display-date').textContent = `${MONTHS[curMonth]} ${curYear}`;
  document.getElementById('footer-year').textContent = new Date().getFullYear();

  const all = [...data.fixos, ...data.variaveis];
  const total = all.reduce((s, i) => s + i.amount, 0);
  const paid = all.reduce((s, i) => s + (i.paid_amount || 0), 0);
  const pending = total - paid;

  document.getElementById('res-total').textContent = fmt(total);
  document.getElementById('res-paid').textContent = fmt(paid);
  document.getElementById('res-pending').textContent = fmt(pending);

  if (list.length === 0) {
    container.innerHTML = `<div style="text-align:center; padding:40px; color:#94a3b8">Nenhum gasto neste mês.</div>`;
    return;
  }

  container.innerHTML = list.map(item => {
    const cat = CATEGORIES[item.cat] || CATEGORIES.outros;
    const pAmount = item.paid_amount || 0;
    const isTotal = pAmount >= item.amount;
    const isPartial = pAmount > 0 && pAmount < item.amount;
    
    let statusClass = '';
    let statusText = 'PAGAR';
    if(isTotal) { statusClass = 'paid'; statusText = 'PAGO'; }
    else if(isPartial) { statusClass = 'partial'; statusText = 'PARCIAL'; }

    return `
      <div class="expense-item">
        <div class="item-left">
          <div class="item-icon" style="background:${cat.bg}; color:${cat.color}">${cat.icon}</div>
          <div class="item-details">
            <div class="name">${item.name}</div>
            <div class="meta">${item.due || 'S/ Data'} • ${item.cat.toUpperCase()}</div>
          </div>
        </div>
        <div class="item-right">
          <div class="item-price">
            <div style="font-size:0.95rem">${fmt(item.amount)}</div>
            ${isPartial ? `<div style="font-size:0.7rem; color:var(--text-muted)">Falta ${fmt(item.amount - pAmount)}</div>` : ''}
          </div>
          <button class="btn-pay ${statusClass}" onclick="openPayModal(${item.id})">
            ${statusText}
          </button>
          <button class="btn-del" onclick="deleteItem(${item.id})">🗑️</button>
        </div>
      </div>
    `;
  }).join('');
}

function openPayModal(id) {
  const db = state[getDbKey()];
  const item = [...db.fixos, ...db.variaveis].find(i => i.id === id);
  if (!item) return;

  currentPayId = id;
  const pAmount = item.paid_amount || 0;
  const remaining = item.amount - pAmount;

  document.getElementById('pay-details').innerHTML = `
    <strong>${item.name}</strong><br>
    Valor Total: ${fmt(item.amount)}<br>
    Já pago: ${fmt(pAmount)}<br>
    <span style="color:var(--danger)">Restante: ${fmt(remaining)}</span>
  `;
  document.getElementById('pay-value').value = remaining.toFixed(2);
  toggleModal('modal-pay', true);
}

function confirmPayment() {
  const val = parseFloat(document.getElementById('pay-value').value);
  if(isNaN(val) || val <= 0) {
    toast("Digite um valor válido!");
    return;
  }

  const db = state[getDbKey()];
  const item = [...db.fixos, ...db.variaveis].find(i => i.id === currentPayId);
  
  if(item) {
    if(!item.paid_amount) item.paid_amount = 0;
    const remaining = item.amount - item.paid_amount;
    const finalVal = Math.min(val, remaining);
    item.paid_amount += finalVal;
    if(item.paid_amount >= item.amount) item.paid = true;

    save();
    toggleModal('modal-pay', false);
    toast(`Pagamento de ${fmt(finalVal)} registrado!`);
  }
}

function addExpense() {
  const name = document.getElementById('in-name').value;
  const amount = parseFloat(document.getElementById('in-amount').value);
  const cat = document.getElementById('in-cat').value;
  const due = document.getElementById('in-due').value;

  if (!name || isNaN(amount)) {
    toast("Preencha nome e valor!");
    return;
  }

  const newItem = {
    id: Date.now(),
    name,
    amount,
    cat,
    due,
    paid_amount: 0,
    paid: false
  };

  state[getDbKey()][currentTab].push(newItem);
  save();
  toggleModal('modal-add', false);
  clearForm();
  toast("Gasto adicionado!");
}

function deleteItem(id) {
  const db = state[getDbKey()];
  db.fixos = db.fixos.filter(i => i.id !== id);
  db.variaveis = db.variaveis.filter(i => i.id !== id);
  save();
  toast("Item removido");
}

function switchTab(t) {
  currentTab = t;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`tab-${t}`).classList.add('active');
  render();
}

function changeMonth(step) {
  curMonth += step;
  if (curMonth > 11) { curMonth = 0; curYear++; }
  if (curMonth < 0) { curMonth = 11; curYear--; }
  load();
  render();
}

function toggleModal(id, open) {
  document.getElementById(id).classList.toggle('open', open);
}

function clearForm() {
  document.getElementById('in-name').value = '';
  document.getElementById('in-amount').value = '';
  document.getElementById('in-due').value = '';
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

window.onload = () => { load(); render(); };
</script>
</body>
</html>
